services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: just_go
      MYSQL_USER: travel
      MYSQL_PASSWORD: travel
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:
